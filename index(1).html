<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smith's Monty Hall Game Show</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Lexend:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --gold-dark: #B8960F;
    --crimson: #DC143C;
    --velvet: #1a0a2e;
    --deep-purple: #2d1b4e;
    --card-bg: #221245;
    --text: #f0e6ff;
    --text-dim: #9b8ab8;
    --green: #2ecc71;
    --green-dark: #27ae60;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Lexend', sans-serif;
    background: var(--velvet);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: 50%;
    transform: translateX(-50%);
    width: 120vw; height: 120vh;
    background: radial-gradient(ellipse at center, rgba(255,215,0,0.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .stage-lights {
    position: fixed; top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--crimson), var(--gold), var(--crimson), var(--gold), transparent);
    background-size: 200px 100%;
    z-index: 100;
    animation: marquee 3s linear infinite;
  }
  @keyframes marquee { 0% { background-position: 0 0; } 100% { background-position: 200px 0; } }

  .container {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto;
    padding: 30px 20px 60px;
  }

  .show-title { text-align: center; margin-bottom: 10px; }
  .show-title h1 {
    font-family: 'Dela Gothic One', cursive;
    font-size: clamp(1.8rem, 5vw, 3.2rem);
    background: linear-gradient(135deg, var(--gold) 0%, #fff8dc 40%, var(--gold) 60%, var(--gold-dark) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 8px rgba(255,215,0,0.3));
    letter-spacing: 1px; line-height: 1.2;
  }
  .show-title .subtitle {
    font-size: 0.85rem; color: var(--text-dim); margin-top: 4px;
    font-weight: 300; letter-spacing: 3px; text-transform: uppercase;
  }

  /* Mode toggle */
  .mode-bar {
    display: flex; justify-content: center; gap: 8px;
    margin: 16px 0 8px; flex-wrap: wrap;
  }
  .mode-btn {
    font-family: 'Lexend', sans-serif; font-size: 0.7rem; font-weight: 500;
    padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.12);
    background: transparent; color: var(--text-dim); cursor: pointer;
    letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s;
  }
  .mode-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
  .mode-btn.active {
    background: rgba(255,215,0,0.12); border-color: var(--gold);
    color: var(--gold); font-weight: 700;
  }

  /* Smith */
  .smith-container {
    display: flex; align-items: flex-start; gap: 16px;
    margin: 20px 0; animation: slideUp 0.5s ease-out;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  .smith-avatar {
    flex-shrink: 0; width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--crimson), #ff6b6b);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; border: 3px solid var(--gold);
    box-shadow: 0 0 20px rgba(220,20,60,0.3);
    animation: bobble 2s ease-in-out infinite;
  }
  @keyframes bobble {
    0%,100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-3px) rotate(2deg); }
    75% { transform: translateY(2px) rotate(-1deg); }
  }

  .speech-bubble {
    background: var(--deep-purple); border: 1px solid rgba(255,215,0,0.15);
    border-radius: 2px 18px 18px 18px; padding: 16px 20px;
    font-size: 0.95rem; line-height: 1.6; flex: 1;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .speech-bubble .smith-name {
    font-weight: 700; color: var(--gold); font-size: 0.8rem;
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; display: block;
  }
  .speech-bubble .typing-text { min-height: 1.6em; }

  /* Doors */
  .doors-container {
    display: flex; justify-content: center;
    gap: clamp(12px, 3vw, 30px); margin: 28px 0;
    perspective: 800px;
  }
  .door-wrapper { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .door {
    width: clamp(100px, 22vw, 160px); height: clamp(140px, 30vw, 220px);
    border-radius: 12px; position: relative; cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s; transform-style: preserve-3d;
  }
  .door:not(.opened):not(.disabled):hover { transform: translateY(-6px) scale(1.03); }
  .door:not(.opened):not(.disabled):active { transform: scale(0.97); }
  .door.disabled { cursor: default; opacity: 0.5; }

  .door-front, .door-back {
    position: absolute; inset: 0; border-radius: 12px;
    backface-visibility: hidden; transition: transform 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .door.fast-flip .door-front, .door.fast-flip .door-back { transition: transform 0.25s ease; }

  .door-front {
    background: linear-gradient(180deg, #3a1f6d 0%, #261350 50%, #1a0a3a 100%);
    border: 2px solid rgba(255,215,0,0.25);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    overflow: hidden;
  }
  .door-front::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 40%;
    background: linear-gradient(180deg, rgba(255,215,0,0.04), transparent); pointer-events: none;
  }
  .door-front .door-icon { font-size: clamp(2rem, 5vw, 3.2rem); }
  .door-front .door-label {
    font-family: 'Dela Gothic One', cursive; font-size: clamp(0.7rem, 2vw, 1rem);
    color: var(--gold); letter-spacing: 2px;
  }
  .door-front .soundproof-badge {
    font-size: 0.55rem; color: var(--text-dim); background: rgba(0,0,0,0.3);
    padding: 3px 8px; border-radius: 20px; letter-spacing: 1px; text-transform: uppercase;
  }

  .door-back {
    transform: rotateY(180deg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; border: 2px solid;
  }
  .door-back.goat { background: linear-gradient(180deg, #4a2c0a, #2d1a06); border-color: #8B4513; box-shadow: 0 8px 32px rgba(139,69,19,0.3); }
  .door-back.car {
    background: linear-gradient(180deg, #1a3a0a, #0d2206); border-color: var(--green);
    box-shadow: 0 0 40px rgba(46,204,113,0.3); animation: carGlow 1.5s ease-in-out infinite alternate;
  }
  @keyframes carGlow { from { box-shadow: 0 0 20px rgba(46,204,113,0.2); } to { box-shadow: 0 0 50px rgba(46,204,113,0.5); } }
  .door-back .reveal-icon { font-size: clamp(2.5rem, 6vw, 4rem); }
  .door-back .reveal-label { font-family: 'Dela Gothic One', cursive; font-size: clamp(0.65rem, 1.8vw, 0.9rem); letter-spacing: 1px; }
  .door-back.goat .reveal-label { color: #d4a574; }
  .door-back.car .reveal-label { color: var(--green); }

  .door.opened .door-front { transform: rotateY(-180deg); }
  .door.opened .door-back { transform: rotateY(0deg); }
  .door.selected .door-front {
    border-color: var(--gold);
    box-shadow: 0 0 30px rgba(255,215,0,0.25), 0 8px 32px rgba(0,0,0,0.5);
  }

  .door-tag {
    font-size: 0.7rem; font-weight: 500; padding: 4px 12px;
    border-radius: 20px; letter-spacing: 1px; text-transform: uppercase;
    min-height: 24px; display: flex; align-items: center;
  }
  .door-tag.your-pick {
    background: rgba(255,215,0,0.15); color: var(--gold);
    border: 1px solid rgba(255,215,0,0.3);
  }

  /* Buttons */
  .action-buttons {
    display: flex; justify-content: center; gap: 16px;
    margin: 24px 0; flex-wrap: wrap; animation: slideUp 0.4s ease-out;
  }
  .btn {
    font-family: 'Lexend', sans-serif; font-weight: 700; font-size: 0.9rem;
    padding: 14px 32px; border-radius: 50px; border: none; cursor: pointer;
    letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s;
  }
  .btn:active { transform: scale(0.96); }
  .btn-switch {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #1a0a2e; box-shadow: 0 4px 20px rgba(255,215,0,0.3);
  }
  .btn-switch:hover { box-shadow: 0 6px 30px rgba(255,215,0,0.5); transform: translateY(-2px); }
  .btn-stay {
    background: transparent; color: var(--text); border: 2px solid rgba(255,255,255,0.2);
  }
  .btn-stay:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); }
  .btn-play {
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    color: #fff; box-shadow: 0 4px 20px rgba(46,204,113,0.3);
    font-size: 1rem; padding: 16px 40px;
  }
  .btn-play:hover { box-shadow: 0 6px 30px rgba(46,204,113,0.5); transform: translateY(-2px); }

  /* Result */
  .result-banner {
    text-align: center; padding: 28px; border-radius: 16px;
    margin: 24px 0; animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes popIn { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }
  .result-banner.win { background: linear-gradient(135deg, rgba(46,204,113,0.15), rgba(46,204,113,0.05)); border: 1px solid rgba(46,204,113,0.3); }
  .result-banner.lose { background: linear-gradient(135deg, rgba(220,20,60,0.15), rgba(220,20,60,0.05)); border: 1px solid rgba(220,20,60,0.3); }
  .result-banner .result-icon { font-size: 3rem; margin-bottom: 8px; }
  .result-banner h2 { font-family: 'Dela Gothic One', cursive; font-size: 1.5rem; margin-bottom: 6px; }
  .result-banner.win h2 { color: var(--green); }
  .result-banner.lose h2 { color: var(--crimson); }
  .result-banner p { color: var(--text-dim); font-size: 0.85rem; line-height: 1.5; }

  /* Scoreboard */
  .scoreboard { display: flex; justify-content: center; gap: 24px; margin: 16px 0; flex-wrap: wrap; }
  .score-card {
    background: var(--deep-purple); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; padding: 12px 24px; text-align: center; min-width: 100px;
  }
  .score-card .label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
  .score-card .value { font-family: 'Dela Gothic One', cursive; font-size: 1.4rem; }
  .score-card .value.wins { color: var(--green); }
  .score-card .value.losses { color: var(--crimson); }
  .score-card .value.rate { color: var(--gold); }

  /* Simulation Panel */
  .sim-panel {
    background: var(--deep-purple); border: 1px solid rgba(255,215,0,0.12);
    border-radius: 16px; padding: 28px; margin: 24px 0;
    animation: slideUp 0.4s ease-out;
  }
  .sim-panel h3 {
    font-family: 'Dela Gothic One', cursive; font-size: 1.1rem;
    color: var(--gold); margin-bottom: 16px; text-align: center;
  }
  .sim-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
    flex-wrap: wrap; justify-content: center;
  }
  .sim-label { font-size: 0.8rem; color: var(--text-dim); min-width: 80px; text-align: right; }
  .sim-input {
    font-family: 'Lexend', sans-serif; font-size: 0.9rem;
    background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 8px 14px; color: var(--text);
    width: 120px; text-align: center;
  }
  .sim-input:focus { outline: none; border-color: var(--gold); }
  .sim-strategy { display: flex; gap: 8px; justify-content: center; margin: 4px 0; flex-wrap: wrap; }
  .sim-strategy .mode-btn { font-size: 0.75rem; padding: 8px 20px; }
  .sim-go {
    font-family: 'Lexend', sans-serif; font-weight: 700; font-size: 0.85rem;
    padding: 12px 36px; border-radius: 50px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #1a0a2e; letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.2s; margin-top: 4px;
  }
  .sim-go:hover { box-shadow: 0 6px 30px rgba(255,215,0,0.4); transform: translateY(-2px); }
  .sim-go:disabled { opacity: 0.5; cursor: default; transform: none; box-shadow: none; }

  .sim-results { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06); }
  .sim-results-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    max-width: 400px; margin: 0 auto;
  }
  .sim-stat {
    background: rgba(0,0,0,0.2); border-radius: 10px; padding: 14px; text-align: center;
  }
  .sim-stat .sim-stat-label {
    font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 2px; margin-bottom: 4px;
  }
  .sim-stat .sim-stat-value { font-family: 'Dela Gothic One', cursive; font-size: 1.3rem; }
  .sim-stat .sim-stat-value.green { color: var(--green); }
  .sim-stat .sim-stat-value.red { color: var(--crimson); }
  .sim-stat .sim-stat-value.gold { color: var(--gold); }

  .sim-bar-container { margin-top: 16px; max-width: 400px; margin-left: auto; margin-right: auto; }
  .sim-bar-label {
    display: flex; justify-content: space-between; font-size: 0.7rem;
    color: var(--text-dim); margin-bottom: 6px;
  }
  .sim-bar-track {
    height: 18px; background: rgba(220,20,60,0.3); border-radius: 10px;
    overflow: hidden;
  }
  .sim-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--green), var(--green-dark));
    border-radius: 10px; transition: width 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
    position: relative;
  }
  .sim-bar-fill::after {
    content: attr(data-pct); position: absolute; right: 8px; top: 50%;
    transform: translateY(-50%); font-size: 0.6rem; font-weight: 700; color: #fff;
  }
  .sim-verdict {
    text-align: center; margin-top: 16px; font-size: 0.85rem;
    color: var(--text); line-height: 1.5;
  }
  .sim-verdict strong { color: var(--gold); }

  /* Floating effects */
  .goat-scream {
    position: fixed; font-size: 4rem; pointer-events: none; z-index: 200;
    animation: goatFloat 2s ease-out forwards;
  }
  @keyframes goatFloat {
    0% { opacity:1; transform: scale(0.5) rotate(0deg); }
    50% { opacity:1; transform: scale(1.2) rotate(15deg) translateY(-40px); }
    100% { opacity:0; transform: scale(0.8) rotate(-10deg) translateY(-120px); }
  }
  .scream-text {
    position: fixed; font-family: 'Dela Gothic One', cursive;
    color: var(--crimson); font-size: 1.2rem; pointer-events: none; z-index: 200;
    animation: screamFloat 1.5s ease-out forwards;
    text-shadow: 0 0 10px rgba(220,20,60,0.5); white-space: nowrap;
  }
  @keyframes screamFloat {
    0% { opacity:0; transform: scale(0.5) rotate(-5deg); }
    30% { opacity:1; transform: scale(1.1) rotate(3deg); }
    100% { opacity:0; transform: translateY(-60px) scale(0.9); }
  }
  .confetti-piece {
    position: fixed; width: 10px; height: 10px; z-index: 150; pointer-events: none;
    animation: confettiFall 3s ease-out forwards;
  }
  @keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0deg); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg); } }

  .hidden { display: none !important; }

  .prob-hint {
    text-align: center; margin-top: 16px; font-size: 0.75rem;
    color: var(--text-dim); font-weight: 300; opacity: 0.7;
  }
  .prob-hint span { color: var(--gold); font-weight: 500; }

  .speed-indicator {
    text-align: center; font-size: 0.65rem; color: var(--text-dim);
    margin-top: -4px; margin-bottom: 8px; letter-spacing: 1px;
  }
  .speed-indicator em { color: var(--gold); font-style: normal; }
</style>
</head>
<body>

<div class="stage-lights"></div>

<div class="container">
  <div class="show-title">
    <h1>Smith's Game Show</h1>
    <div class="subtitle">The Monty Hall Challenge</div>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" id="mode-normal" onclick="setMode('normal')">🎮 Normal</button>
    <button class="mode-btn" id="mode-fast" onclick="setMode('fast')">⚡ Fast</button>
    <button class="mode-btn" id="mode-sim" onclick="setMode('sim')">📊 Simulate</button>
  </div>
  <div class="speed-indicator" id="speed-indicator">Mode: <em>Normal</em> — full Smith experience</div>

  <div class="scoreboard">
    <div class="score-card"><div class="label">Games</div><div class="value" id="games-val">0</div></div>
    <div class="score-card"><div class="label">Wins</div><div class="value wins" id="wins-val">0</div></div>
    <div class="score-card"><div class="label">Losses</div><div class="value losses" id="losses-val">0</div></div>
    <div class="score-card"><div class="label">Win Rate</div><div class="value rate" id="rate-val">—</div></div>
  </div>

  <!-- GAME AREA -->
  <div id="game-area">
    <div id="smith-speech" class="smith-container">
      <div class="smith-avatar">🎩</div>
      <div class="speech-bubble">
        <span class="smith-name">Smith</span>
        <div class="typing-text" id="smith-text"></div>
      </div>
    </div>
    <div class="doors-container" id="doors-container"></div>
    <div id="action-area" class="action-buttons hidden"></div>
    <div id="result-area" class="hidden"></div>
    <div id="prob-hint" class="prob-hint hidden"></div>
  </div>

  <!-- SIM AREA -->
  <div id="sim-area" class="hidden">
    <div class="sim-panel">
      <h3>🔬 Monte Carlo Simulator</h3>
      <div class="sim-row">
        <span class="sim-label">Rounds:</span>
        <input class="sim-input" id="sim-rounds" type="number" value="10000" min="10" max="1000000" step="100">
      </div>
      <div class="sim-row">
        <span class="sim-label">Strategy:</span>
        <div class="sim-strategy">
          <button class="mode-btn active" id="strat-switch" onclick="setStrategy('switch')">🔄 Always Switch</button>
          <button class="mode-btn" id="strat-stay" onclick="setStrategy('stay')">✊ Always Stay</button>
          <button class="mode-btn" id="strat-both" onclick="setStrategy('both')">⚖️ Compare Both</button>
        </div>
      </div>
      <div class="sim-row">
        <button class="sim-go" id="sim-go-btn" onclick="runSimulation()">🚀 Run Simulation</button>
      </div>
      <div id="sim-results" class="sim-results hidden"></div>
    </div>
  </div>
</div>

<script>
const GOAT_SCREAMS = ["BAAAAA!!!","MEEEEEH!!!","BLEEEET!","NAAAAAAH!","BÆÆÆÆÆ!","MAAAAA!!!"];

const SMITH_LINES = {
  intro: [
    "Welcome, welcome, WELCOME to my show! 🎪 Behind these three soundproof boxes: TWO goats and ONE shiny car. Pick a box... if you dare!",
    "Step right up! Three boxes, two goats, one car. The goats are DYING to meet you but the soundproofing keeps 'em quiet... for now. Choose wisely!",
    "Ah, a new contestant! Behind these beautifully soundproofed boxes lurk two goats and a gorgeous car. The goats can scream all they want — you won't hear a thing. Yet. Pick one!"
  ],
  reveal: [
    "Ohoho! Interesting choice... Let me help you out. I KNOW what's behind every box, and I'm feeling generous today...",
    "Bold move! Now, because I'm such a nice guy, let me show you a little something...",
    "Hmm, fascinating strategy. Now watch closely — your pal Smith is about to blow your mind..."
  ],
  afterReveal: [
    "SURPRISE! 🐐 A goat! Listen to it scream! Now here's the million-dollar question: do you SWITCH to the other box, or STAY with your gut? Choose carefully~",
    "There it is — a goat, screaming its heart out now that the box is open! So... do you stick with your pick or switch? The math nerds say one is better than the other 😏",
    "And it's a GOAT! Now you can hear it yelling! Beautiful. So, my friend — switch or stay? Your destiny awaits!"
  ],
  winSwitch: [
    "YOU SWITCHED AND WON! 🚗 Brilliant! You outsmarted the goats AND the odds!",
    "INCREDIBLE! The switch pays off! That's a BRAND NEW CAR! 🚗✨",
  ],
  winStay: [
    "NO WAY! You stayed and WON?! Against the odds! Lucky devil! 🚗🍀",
    "You KEPT your original pick and it was the CAR?! Absolute legend! 🚗",
  ],
  loseSwitch: [
    "Oh no... you switched TO a goat! 🐐 BAAAA! Better luck next time!",
    "Switched and... got a goat! The goat looks thrilled though. 🐐",
  ],
  loseStay: [
    "Stayed and... GOAT. 🐐 The car was in the other box! Should've switched~",
    "Oh dear, you stuck with a goat! The car was RIGHT THERE! 🐐",
  ]
};

// ========== STATE ==========
let currentMode = 'normal';
let simStrategy = 'switch';
let typingVersion = 0; // incremented to cancel stale typing

let state = {
  carPosition: -1,
  selectedDoor: -1,
  revealedDoor: -1,
  phase: 'pick',
  busy: false,
  stats: { games: 0, wins: 0, losses: 0 }
};

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ========== TYPING WITH VERSION-BASED CANCELLATION ==========
function smithSays(text) {
  typingVersion++;
  const myVersion = typingVersion;
  const el = document.getElementById('smith-text');

  if (currentMode === 'fast') {
    el.textContent = text;
    return Promise.resolve();
  }

  return new Promise((resolve) => {
    el.textContent = '';
    let i = 0;
    const interval = setInterval(() => {
      // If a newer call has started, stop this one
      if (myVersion !== typingVersion) {
        clearInterval(interval);
        resolve();
        return;
      }
      el.textContent += text[i];
      i++;
      if (i >= text.length) {
        clearInterval(interval);
        resolve();
      }
    }, 18);
  });
}

function delay(ms) {
  if (currentMode === 'fast') return new Promise(r => setTimeout(r, 50));
  return new Promise(r => setTimeout(r, ms));
}

// ========== MODE SWITCHING ==========
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-bar > .mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`mode-${mode}`).classList.add('active');

  const indicator = document.getElementById('speed-indicator');
  const gameArea = document.getElementById('game-area');
  const simArea = document.getElementById('sim-area');

  if (mode === 'sim') {
    gameArea.classList.add('hidden');
    simArea.classList.remove('hidden');
    indicator.innerHTML = 'Mode: <em>Simulate</em> — crunch the numbers';
  } else {
    gameArea.classList.remove('hidden');
    simArea.classList.add('hidden');
    if (mode === 'fast') {
      indicator.innerHTML = 'Mode: <em>Fast</em> — skip the chatter';
    } else {
      indicator.innerHTML = 'Mode: <em>Normal</em> — full Smith experience';
    }
    if (state.phase === 'pick' || state.phase === 'result' || state.phase === 'idle') {
      startGame();
    }
  }
}

function setStrategy(strat) {
  simStrategy = strat;
  ['switch','stay','both'].forEach(s => {
    document.getElementById(`strat-${s}`).classList.toggle('active', s === strat);
  });
}

// ========== EFFECTS ==========
function spawnGoatScream(x, y) {
  if (currentMode === 'fast') return;
  const goat = document.createElement('div');
  goat.className = 'goat-scream';
  goat.textContent = '🐐';
  goat.style.left = x + 'px'; goat.style.top = y + 'px';
  document.body.appendChild(goat);
  setTimeout(() => {
    const scream = document.createElement('div');
    scream.className = 'scream-text';
    scream.textContent = rand(GOAT_SCREAMS);
    scream.style.left = (x - 30) + 'px'; scream.style.top = (y - 30) + 'px';
    document.body.appendChild(scream);
    setTimeout(() => scream.remove(), 1500);
  }, 300);
  setTimeout(() => goat.remove(), 2000);
}

function spawnConfetti() {
  const colors = ['#FFD700','#DC143C','#2ecc71','#fff','#ff6b6b','#ffd93d'];
  for (let i = 0; i < 50; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw'; piece.style.top = -10 + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.animationDelay = (Math.random() * 1.5) + 's';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 5000);
  }
}

// ========== DOORS ==========
function buildDoors() {
  const container = document.getElementById('doors-container');
  container.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const wrapper = document.createElement('div');
    wrapper.className = 'door-wrapper';
    const isCar = i === state.carPosition;
    wrapper.innerHTML = `
      <div class="door${currentMode === 'fast' ? ' fast-flip' : ''}" data-index="${i}" id="door-${i}">
        <div class="door-front">
          <div class="door-icon">📦</div>
          <div class="door-label">BOX ${i + 1}</div>
          <div class="soundproof-badge">🔇 soundproof</div>
        </div>
        <div class="door-back ${isCar ? 'car' : 'goat'}">
          <div class="reveal-icon">${isCar ? '🚗' : '🐐'}</div>
          <div class="reveal-label">${isCar ? 'A CAR!' : 'A GOAT!'}</div>
        </div>
      </div>
      <div class="door-tag" id="tag-${i}">&nbsp;</div>
    `;
    container.appendChild(wrapper);
    wrapper.querySelector('.door').addEventListener('click', () => handleDoorClick(i));
  }
}

// ========== GAME LOGIC ==========
async function startGame() {
  state.carPosition = Math.floor(Math.random() * 3);
  state.selectedDoor = -1;
  state.revealedDoor = -1;
  state.phase = 'pick';
  state.busy = false;

  document.getElementById('action-area').classList.add('hidden');
  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('prob-hint').classList.add('hidden');

  buildDoors();
  await smithSays(rand(SMITH_LINES.intro));
}

async function handleDoorClick(index) {
  if (state.phase !== 'pick' || state.busy) return;
  state.busy = true;
  state.selectedDoor = index;
  state.phase = 'revealing';

  document.getElementById(`door-${index}`).classList.add('selected');
  document.getElementById(`tag-${index}`).classList.add('your-pick');
  document.getElementById(`tag-${index}`).textContent = '⭐ YOUR PICK';
  document.querySelectorAll('.door').forEach(d => d.classList.add('disabled'));

  await smithSays(rand(SMITH_LINES.reveal));

  const goatDoors = [0,1,2].filter(d => d !== index && d !== state.carPosition);
  state.revealedDoor = rand(goatDoors);

  await delay(800);

  const revealDoor = document.getElementById(`door-${state.revealedDoor}`);
  revealDoor.classList.add('opened');

  const rect = revealDoor.getBoundingClientRect();
  setTimeout(() => {
    spawnGoatScream(rect.left + rect.width/2 - 20, rect.top);
    spawnGoatScream(rect.left + rect.width/2 + 20, rect.top - 20);
  }, currentMode === 'fast' ? 100 : 600);

  await delay(1500);
  await smithSays(rand(SMITH_LINES.afterReveal));

  state.phase = 'switch';
  state.busy = false;

  const actionArea = document.getElementById('action-area');
  actionArea.innerHTML = `
    <button class="btn btn-switch" onclick="makeDecision(true)">🔄 Switch!</button>
    <button class="btn btn-stay" onclick="makeDecision(false)">✊ Stay!</button>
  `;
  actionArea.classList.remove('hidden');

  const hintArea = document.getElementById('prob-hint');
  hintArea.innerHTML = `Psst... statistically, switching wins <span>2/3</span> of the time, staying wins <span>1/3</span>. But hey, luck is luck! 🍀`;
  hintArea.classList.remove('hidden');
}

async function makeDecision(doSwitch) {
  if (state.phase !== 'switch' || state.busy) return;
  state.busy = true;
  state.phase = 'result';

  document.getElementById('action-area').classList.add('hidden');
  document.getElementById('prob-hint').classList.add('hidden');

  if (doSwitch) {
    const finalDoor = [0,1,2].find(d => d !== state.selectedDoor && d !== state.revealedDoor);
    document.getElementById(`door-${state.selectedDoor}`).classList.remove('selected');
    document.getElementById(`tag-${state.selectedDoor}`).className = 'door-tag';
    document.getElementById(`tag-${state.selectedDoor}`).textContent = '\u00A0';
    document.getElementById(`door-${finalDoor}`).classList.add('selected');
    document.getElementById(`tag-${finalDoor}`).classList.add('your-pick');
    document.getElementById(`tag-${finalDoor}`).textContent = '⭐ YOUR PICK';
    state.selectedDoor = finalDoor;
    await delay(600);
  }

  [0,1,2].forEach(i => document.getElementById(`door-${i}`).classList.add('opened'));

  const won = state.selectedDoor === state.carPosition;

  if (!won) {
    const rect = document.getElementById(`door-${state.selectedDoor}`).getBoundingClientRect();
    setTimeout(() => spawnGoatScream(rect.left + rect.width/2, rect.top), currentMode === 'fast' ? 50 : 400);
  }

  await delay(800);

  state.stats.games++;
  if (won) state.stats.wins++; else state.stats.losses++;
  updateStats();

  let lineKey;
  if (won && doSwitch) lineKey = 'winSwitch';
  else if (won && !doSwitch) lineKey = 'winStay';
  else if (!won && doSwitch) lineKey = 'loseSwitch';
  else lineKey = 'loseStay';

  await smithSays(rand(SMITH_LINES[lineKey]));
  if (won) spawnConfetti();

  const resultArea = document.getElementById('result-area');
  resultArea.className = won ? 'result-banner win' : 'result-banner lose';
  resultArea.innerHTML = `
    <div class="result-icon">${won ? '🚗' : '🐐'}</div>
    <h2>${won ? 'YOU WIN!' : 'YOU LOSE!'}</h2>
    <p>${won
      ? `You ${doSwitch ? 'switched' : 'stayed'} and got the car!`
      : `You ${doSwitch ? 'switched' : 'stayed'} and got a goat. The car was behind Box ${state.carPosition + 1}.`}</p>
  `;
  resultArea.classList.remove('hidden');

  const actionArea = document.getElementById('action-area');
  actionArea.innerHTML = `<button class="btn btn-play" onclick="startGame()">🎪 Play Again</button>`;
  actionArea.classList.remove('hidden');
  state.busy = false;
}

function updateStats() {
  document.getElementById('games-val').textContent = state.stats.games;
  document.getElementById('wins-val').textContent = state.stats.wins;
  document.getElementById('losses-val').textContent = state.stats.losses;
  const rate = state.stats.games > 0
    ? Math.round(state.stats.wins / state.stats.games * 100) + '%' : '—';
  document.getElementById('rate-val').textContent = rate;
}

// ========== SIMULATION ==========
function runSimulation() {
  const rounds = Math.min(1000000, Math.max(10, parseInt(document.getElementById('sim-rounds').value) || 10000));
  document.getElementById('sim-rounds').value = rounds;
  const btn = document.getElementById('sim-go-btn');
  btn.disabled = true; btn.textContent = '⏳ Running...';

  setTimeout(() => {
    const results = {};

    function simulate(strategy) {
      let wins = 0;
      for (let i = 0; i < rounds; i++) {
        const car = Math.floor(Math.random() * 3);
        const pick = Math.floor(Math.random() * 3);
        const goats = [0,1,2].filter(d => d !== pick && d !== car);
        const revealed = goats[Math.floor(Math.random() * goats.length)];
        let finalPick;
        if (strategy === 'switch') {
          finalPick = [0,1,2].find(d => d !== pick && d !== revealed);
        } else {
          finalPick = pick;
        }
        if (finalPick === car) wins++;
      }
      return wins;
    }

    if (simStrategy === 'both') {
      results.switchWins = simulate('switch');
      results.stayWins = simulate('stay');
    } else if (simStrategy === 'switch') {
      results.switchWins = simulate('switch');
    } else {
      results.stayWins = simulate('stay');
    }

    renderSimResults(results, rounds);
    btn.disabled = false; btn.textContent = '🚀 Run Simulation';
  }, 50);
}

function renderSimResults(results, rounds) {
  const container = document.getElementById('sim-results');
  container.classList.remove('hidden');

  if (simStrategy === 'both') {
    const swPct = (results.switchWins / rounds * 100).toFixed(2);
    const stPct = (results.stayWins / rounds * 100).toFixed(2);
    container.innerHTML = `
      <div class="sim-results-grid">
        <div class="sim-stat"><div class="sim-stat-label">🔄 Switch Wins</div><div class="sim-stat-value green">${results.switchWins.toLocaleString()}</div></div>
        <div class="sim-stat"><div class="sim-stat-label">✊ Stay Wins</div><div class="sim-stat-value red">${results.stayWins.toLocaleString()}</div></div>
        <div class="sim-stat"><div class="sim-stat-label">Switch Win %</div><div class="sim-stat-value gold">${swPct}%</div></div>
        <div class="sim-stat"><div class="sim-stat-label">Stay Win %</div><div class="sim-stat-value gold">${stPct}%</div></div>
      </div>
      <div class="sim-bar-container">
        <div class="sim-bar-label"><span>🔄 Switch: ${swPct}%</span><span>✊ Stay: ${stPct}%</span></div>
        <div class="sim-bar-track"><div class="sim-bar-fill" style="width:${swPct}%" data-pct="${swPct}%"></div></div>
      </div>
      <div class="sim-verdict">
        Over <strong>${rounds.toLocaleString()}</strong> rounds, switching won <strong>${swPct}%</strong> vs staying at <strong>${stPct}%</strong>.<br>
        ${parseFloat(swPct) > parseFloat(stPct)
          ? 'Switching is the superior strategy — just like the math predicts! 🧮'
          : 'Interesting fluctuation, but run more rounds and switching will dominate!'}
      </div>
    `;
  } else {
    const wins = simStrategy === 'switch' ? results.switchWins : results.stayWins;
    const losses = rounds - wins;
    const pct = (wins / rounds * 100).toFixed(2);
    const expected = simStrategy === 'switch' ? '66.67' : '33.33';
    container.innerHTML = `
      <div class="sim-results-grid">
        <div class="sim-stat"><div class="sim-stat-label">Wins</div><div class="sim-stat-value green">${wins.toLocaleString()}</div></div>
        <div class="sim-stat"><div class="sim-stat-label">Losses</div><div class="sim-stat-value red">${losses.toLocaleString()}</div></div>
        <div class="sim-stat"><div class="sim-stat-label">Win Rate</div><div class="sim-stat-value gold">${pct}%</div></div>
        <div class="sim-stat"><div class="sim-stat-label">Expected</div><div class="sim-stat-value gold">${expected}%</div></div>
      </div>
      <div class="sim-bar-container">
        <div class="sim-bar-label"><span>Wins: ${pct}%</span><span>Losses: ${(100 - parseFloat(pct)).toFixed(2)}%</span></div>
        <div class="sim-bar-track"><div class="sim-bar-fill" style="width:${pct}%" data-pct="${pct}%"></div></div>
      </div>
      <div class="sim-verdict">
        Strategy: <strong>Always ${simStrategy === 'switch' ? 'Switch' : 'Stay'}</strong> over <strong>${rounds.toLocaleString()}</strong> rounds.<br>
        Win rate: <strong>${pct}%</strong> (expected ~${expected}%). ${
          Math.abs(parseFloat(pct) - parseFloat(expected)) < 1
            ? 'Right on target! The math doesn\'t lie. 🎯'
            : 'Close to the theoretical value — run more rounds for convergence!'
        }
      </div>
    `;
  }
}

// Start
startGame();
</script>
</body>
</html>
